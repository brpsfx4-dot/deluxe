<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <title>Iniciar Sesión</title>
    <link rel="stylesheet" href="./insss.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Antonio:wght@100..700&family=Bellefair&family=DM+Serif+Text:ital@0;1&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Julius+Sans+One&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Petrona:ital,wght@0,100..900;1,100..900&family=Smooch+Sans:wght@100..900&family=Vina+Sans&display=swap" rel="stylesheet">

<body>
    
<div class="hdd">
    <div class="bx1">
        <form class="login-form">
            <h2>Iniciar Sesión</h2>
    
            <div class="input-group">
                <label for="usuario">Usuario</label>
                <input type="text" id="usuario" placeholder="Introduce tu usuario" required>
            </div>
    
            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Introduce tu contraseña" required>
            </div>
    
            <button type="submit" class="btinc">Ingresar</button>
        </form>
    </div>
</div>

<script type="module" src="./anm.js"></script>
